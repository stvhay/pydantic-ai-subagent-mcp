name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/
      - run: uv run pytest -v

  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version bump consistency
        run: |
          # If CHANGELOG has an Unreleased section, validate bump comment exists
          if grep -q "## Unreleased" CHANGELOG.md; then
            if ! grep -qE "<!--\s*bump:\s*(major|minor|patch)\s*-->" CHANGELOG.md; then
              echo "::error::CHANGELOG.md has '## Unreleased' but no <!-- bump: TYPE --> comment"
              exit 1
            fi
          fi

          # If PR has a bump label, check it matches the changelog comment
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          BUMP_LABEL=""
          for label in $PR_LABELS; do
            case "$label" in
              bump:major|bump:minor|bump:patch)
                BUMP_LABEL="${label#bump:}"
                ;;
            esac
          done

          if [ -n "$BUMP_LABEL" ]; then
            CHANGELOG_BUMP=$(grep -oP '<!--\s*bump:\s*\K(major|minor|patch)' CHANGELOG.md || true)
            if [ "$BUMP_LABEL" != "$CHANGELOG_BUMP" ]; then
              echo "::error::PR label bump:$BUMP_LABEL doesn't match CHANGELOG comment bump:$CHANGELOG_BUMP"
              exit 1
            fi
          fi
          echo "Version check passed"
