name: Release PR

on:
  push:
    branches: [main]

concurrency:
  group: release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check for unreleased changes
        id: check
        run: |
          if grep -q "## Unreleased" CHANGELOG.md; then
            echo "has_unreleased=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_unreleased=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute and update version
        if: steps.check.outputs.has_unreleased == 'true'
        id: version
        run: |
          NEW_VERSION=$(python compute_version.py)
          python compute_version.py --ci --update
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # The token below prefers `RELEASE_PAT` over `GITHUB_TOKEN`.
      # PRs opened with the default `GITHUB_TOKEN` cannot trigger downstream
      # workflows (GitHub's anti-recursion rule), which means CI's `test`
      # status check would not run on the release PR and it could never be
      # merged on a protected branch. Set a `RELEASE_PAT` repository secret
      # (a fine-grained PAT with `contents: write` and `pull-requests: write`
      # on this repo) to enable full automation. Without it, the PR is still
      # opened, but you must close-and-reopen it (or push an empty commit) to
      # trigger CI before merging.
      - name: Open release PR
        if: steps.check.outputs.has_unreleased == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "release: v${{ steps.version.outputs.version }}"
          title: "release: v${{ steps.version.outputs.version }}"
          body: |
            Automated release PR for **v${{ steps.version.outputs.version }}**.

            This PR was opened by the `Release PR` workflow because `CHANGELOG.md`
            contained an `## Unreleased` section. It bumps the version in
            `pyproject.toml`, `src/pydantic_ai_subagent_mcp/__init__.py`, and
            rewrites the changelog header.

            **Merging this PR** will trigger the `Tag and Release` workflow,
            which creates the git tag and GitHub release.
          branch: "release/v${{ steps.version.outputs.version }}"
          delete-branch: true
          labels: release
