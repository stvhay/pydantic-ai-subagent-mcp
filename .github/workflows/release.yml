name: Release

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check for unreleased changes
        id: check
        run: |
          if grep -q "## Unreleased" CHANGELOG.md; then
            echo "has_unreleased=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_unreleased=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute and update version
        if: steps.check.outputs.has_unreleased == 'true'
        id: version
        run: |
          NEW_VERSION=$(python compute_version.py)
          python compute_version.py --ci --update
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.check.outputs.has_unreleased == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.version.outputs.version }}"

      - name: Create tag
        if: steps.check.outputs.has_unreleased == 'true'
        run: |
          TAG="$(date -u +%Y-%m-%dT%H%M%SZ)"
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.check.outputs.has_unreleased == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          gh release create "$TAG" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "See [CHANGELOG.md](CHANGELOG.md) for details."
